<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CS146J final project</title>
    <link rel="stylesheet" href="styles.css" />
    <!-- 1. Load Axios (Required dependency) -->
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!-- 2. Load TextAlive App API (Exposes a global variable named TextAliveApp) -->
    <script src="https://unpkg.com/textalive-app-api/dist/index.js"></script>
    <!-- 3. Your custom code (NO type="module" here) -->
  </head>
  <body>
    <nav>
      <h1>SynchSonare</h1>
      <ul>
        <li>
          <a href="/leaderboard.html">Leaderboard</a>
        </li>
        <li>
          <a href="/gacha.html">Gacha</a>
        </li>
        <li>
          <a href="/index.html">Home</a>
          <!-- <div id="Logout">Logout</div> -->
        </li>
      </ul>
    </nav>
    <main>
      <aside id="song-sidebar" class="song-sidebar">
        <div class="sidebar-header">
          <h2>Song List</h2>
          <p>Tap the card to open/close.</p>
        </div>
        <div id="song-list" class="song-list"></div>
      </aside>
      <section id="gameContainer">
        <button id="prevBtn" class="arrow">&#9664;</button>
        <div id="song-card">
          <img
            id="song-image"
            src="images/Hatsune_miku_v6.webp"
            alt="song image"
          />
          <h2 id="song-card-title">Song Title</h2>
          <div id="text"></div>
        </div>
        <button id="nextBtn" class="arrow">&#9654;</button>
      </section>
      <div class="select-wrap">
        <button id="selectBtn" class="select-btn">Select</button>
      </div>

      <!-- Confirmation modal -->
      <div id="confirm-modal" class="modal hidden">
        <div class="modal-overlay" id="modal-overlay"></div>
        <div class="modal-dialog">
          <p id="modal-message">Begin game with this song?</p>
          <div class="modal-actions">
            <button id="confirm-yes" class="btn confirm-yes">Yes</button>
            <button id="confirm-no" class="btn confirm-no">No</button>
          </div>
        </div>
      </div>
      <script src="game.js"></script>
      <script src="logout.js"></script>
    </main>
  </body>
</html>
